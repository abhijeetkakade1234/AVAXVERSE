name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─── Smart Contract Tests ──────────────────────────────────────────────────
  contracts:
    name: 🔗 Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile contracts
        run: bun run compile

      - name: Run tests
        run: bun run test

  # ─── Frontend Lint & Build ─────────────────────────────────────────────────
  frontend:
    name: 🎨 Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: ${{ secrets.WALLET_CONNECT_PROJECT_ID }}
          NEXT_PUBLIC_IDENTITY_REGISTRY: ${{ secrets.IDENTITY_REGISTRY }}
          NEXT_PUBLIC_REPUTATION_TOKEN: ${{ secrets.REPUTATION_TOKEN }}
          NEXT_PUBLIC_ESCROW_FACTORY: ${{ secrets.ESCROW_FACTORY }}
